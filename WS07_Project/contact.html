    <!-- Main content -->

  <main>
 <form id="myForm" class="needs-validation" novalidate>
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label">Email address</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
      <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
      <div class="valid-feedback">Email looks good.</div>
      <div class="invalid-feedback">Please enter a valid email address.</div>
    </div>

    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label">Password</label>
      <input type="password" class="form-control" id="exampleInputPassword1" required>
      <div class="valid-feedback">Password looks good.</div>
      <div class="invalid-feedback">Please enter your password.</div>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="exampleCheck1" required>
      <label class="form-check-label" for="exampleCheck1">Check me out</label>
      <div class="invalid-feedback">You must check this box before submitting.</div>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>

    <div id="formMessage"></div>
  </form>

  <script>
    const form = document.getElementById("myForm");
    const formMessage = document.getElementById("formMessage");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      if (form.checkValidity()) {
        formMessage.textContent = "Everything is OK. Form submitted successfully.";
        formMessage.className = "success";
      } else {
        formMessage.textContent = "Something is missing. Please check the form.";
        formMessage.className = "error";
      }

      form.classList.add("was-validated");
    });
  </script>
</main>
